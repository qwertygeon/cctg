name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck·bash·jq 는 ubuntu-latest 러너에 사전 설치되어 있다.
      - name: Tool versions
        run: |
          shellcheck --version | sed -n '1,2p'
          bash --version | head -n1
          jq --version

      # 모든 셸 스크립트 구문 검사 (data 카탈로그·completions 포함).
      - name: Syntax check (bash -n)
        run: |
          for f in cc-tg.sh install.sh uninstall.sh scripts/*.sh messages/*.sh; do
            echo "bash -n $f"; bash -n "$f"
          done

      # 정적 분석은 로직 스크립트로 한정한다:
      #   - messages/*.sh 는 t() 가 eval 로 소비하는 데이터 카탈로그(SC2034 다수) → 키 검증은 아래 i18n 린트가 담당.
      #   - completions/* 는 COMPREPLY=( $(compgen ...) ) 관용구(SC2207)가 본질적이라 정적 분석 대상에서 제외.
      - name: ShellCheck (logic scripts)
        run: shellcheck -S warning cc-tg.sh install.sh uninstall.sh scripts/*.sh

      # 메시지 카탈로그 키 패리티 + 참조 키 검증.
      - name: i18n key parity
        run: bash scripts/check-i18n-keys.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # bats(테스트 러너)는 러너에 없을 수 있어 apt 로 설치. jq 는 사전 설치.
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Tool versions
        run: |
          bats --version
          jq --version

      # cc-tg.sh 의 등록/명령 동작을 격리된 임시 상태 트리에서 검증한다.
      # tmux 는 tests/stubs/tmux 가 대체하므로 러너에 tmux 가 없어도 동작한다.
      - name: bats
        run: bats tests/
