# GitHub Pages (Jekyll) — project site for CCTG.
# Renders index.md as the homepage with the Cayman theme. The title/description
# below feed the page <title> and meta description (jekyll-seo-tag), which is what
# search engines index. Source: this branch's root (deploy from branch → gh-pages /).
title: CCTG — Claude Code Tmux Gateway
description: >-
  Easily connect and manage Telegram/Discord chat-bot gateways with tmux —
  run a per-project Claude Code bot on macOS, controllable from your phone.
theme: jekyll-theme-cayman
show_downloads: true

# Project-page URL (qwertygeon.github.io/cctg) — also lets jekyll-sitemap emit
# absolute URLs in /sitemap.xml and jekyll-seo-tag set canonical links.
url: "https://qwertygeon.github.io"
baseurl: "/cctg"
plugins:
  - jekyll-sitemap

# Google Search Console — jekyll-seo-tag emits the verification <meta> into <head>.
google_site_verification: 8Ilnvj1NEOIDmlXWeSPT4vHuUD-eIthC9V9KFHk_CdY

# Non-site files: keep them out of the build (they are still in the repo).
exclude:
  - lib
  - tests
  - completions
  - scripts
  - messages
  - "*.sh"
